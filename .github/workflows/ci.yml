name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint (RuboCop)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: RuboCop
        run: bundle exec rubocop --parallel

  security:
    name: Security (Brakeman + dependency audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Brakeman static analysis
        run: bundle exec brakeman --no-pager --quiet

      - name: Audit gems for known CVEs
        run: bundle exec bundler-audit check --update

      - name: Audit JavaScript importmap for known CVEs
        run: bin/importmap audit

  test:
    name: Tests (RSpec)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      PGHOST: localhost
      PGUSER: postgres
      PGPASSWORD: postgres
      RAILS_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm packages
        run: npm ci

      - name: Build Tailwind CSS
        run: bin/rails tailwindcss:build

      - name: Check Zeitwerk autoloading
        run: bin/rails zeitwerk:check

      - name: Set up database
        run: bin/rails db:test:prepare

      - name: Run tests
        run: bundle exec rspec
